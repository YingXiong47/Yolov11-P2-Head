# custom_yolo11_p2.yaml
# Ultralytics YOLO11 detect model with P2/4, P3/8, P4/16 outputs

nc: 80  # change this to your number of classes

scales:
  # [depth, width, max_channels]
  n: [0.50, 0.25, 1024]
  s: [0.50, 0.50, 1024]
  m: [0.50, 1.00, 512]
  l: [1.00, 1.00, 512]
  x: [1.00, 1.50, 512]

backbone:
  # [from, repeats, module, args]
  - [-1, 1, Conv, [64, 3, 2]]          # 0  P1/2
  - [-1, 1, Conv, [128, 3, 2]]         # 1  P2/4
  - [-1, 2, C3k2, [256, False, 0.25]]  # 2  P2 features
  - [-1, 1, Conv, [256, 3, 2]]         # 3  P3/8
  - [-1, 2, C3k2, [512, False, 0.25]]  # 4  P3 features
  - [-1, 1, Conv, [512, 3, 2]]         # 5  P4/16
  - [-1, 2, C3k2, [512, True]]         # 6  P4 features
  - [-1, 1, Conv, [1024, 3, 2]]        # 7  P5/32
  - [-1, 2, C3k2, [1024, True]]        # 8  P5 features
  - [-1, 1, SPPF, [1024, 5]]           # 9
  - [-1, 2, C2PSA, [1024]]             # 10

head:
  # P5 -> P4
  - [-1, 1, nn.Upsample, [None, 2, "nearest"]]   # 11
  - [[-1, 6], 1, Concat, [1]]                    # 12 cat backbone P4
  - [-1, 2, C3k2, [512, False]]                  # 13 P4

  # P4 -> P3
  - [-1, 1, nn.Upsample, [None, 2, "nearest"]]   # 14
  - [[-1, 4], 1, Concat, [1]]                    # 15 cat backbone P3
  - [-1, 2, C3k2, [256, False]]                  # 16 P3

  # P3 -> P2
  - [-1, 1, nn.Upsample, [None, 2, "nearest"]]   # 17
  - [[-1, 2], 1, Concat, [1]]                    # 18 cat backbone P2
  - [-1, 2, C3k2, [128, False]]                  # 19 P2

  # P2 -> P3
  - [-1, 1, Conv, [256, 3, 2]]                   # 20
  - [[-1, 16], 1, Concat, [1]]                   # 21 cat head P3
  - [-1, 2, C3k2, [256, False]]                  # 22 P3

  # P3 -> P4
  - [-1, 1, Conv, [512, 3, 2]]                   # 23
  - [[-1, 13], 1, Concat, [1]]                   # 24 cat head P4
  - [-1, 2, C3k2, [512, False]]                  # 25 P4

  # Detect on P2, P3, P4
  - [[19, 22, 25], 1, Detect, [nc]]